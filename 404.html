<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Patryk Stępień — Developer</title>
    <script>
        // GitHub Pages SPA redirect: encode current path and redirect to index.html
        // The decode script in index.html will restore the URL via history.replaceState
        var path = window.location.pathname;
        var search = window.location.search;
        var hash = window.location.hash;
        var url = '/?p=' + encodeURIComponent(path + search) + (hash || '');
        window.location.replace(url);
    </script>
</head>
<body>
    Redirecting&hellip;
</body>
</html>
